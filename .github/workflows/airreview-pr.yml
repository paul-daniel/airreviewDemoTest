name: AirReview PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  airreview-review:
    name: Generate AirReview report
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.base_ref }}

      - name: Fetch PR head and base
        run: |
          git fetch origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          git fetch origin "+refs/pull/${{ github.event.pull_request.number }}/head:refs/heads/airreview-pr-head"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AirReview
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/paul-daniel/airreview.git@main"

      - name: Azure login with OIDC
        if: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run AirReview
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_MODEL: ${{ vars.FOUNDRY_MODEL }}
          AIRREVIEW_AGENT_MODE: ${{ vars.AIRREVIEW_AGENT_MODE }}
          FOUNDRY_API_KEY: ${{ secrets.FOUNDRY_API_KEY }}
          AIRREVIEW_MAX_FILES_PER_CHUNK: "4"
          AIRREVIEW_MAX_DIFF_CHARS_PER_CHUNK: "12000"
          AIRREVIEW_MAX_CHUNKS: "3"
          AIRREVIEW_STOP_WHEN_BUDGET_EXCEEDED: "true"
          AIRREVIEW_MAX_FINDINGS: "6"
          AIRREVIEW_MAX_OUTPUT_TOKENS: "1800"
          AIRREVIEW_MODEL_RETRIES: "4"
          AIRREVIEW_RATE_LIMIT_BACKOFF_SECONDS: "12,30,60,90"
          AIRREVIEW_MODEL_CALL_DELAY_SECONDS: "3"
        run: |
          airreview airreview-pr-head \
            --base origin/${{ github.base_ref }} \
            --output

      - name: Stage AirReview report artifact
        run: |
          mkdir -p airreview-artifact
          cp .airreview/reviews/airreview-pr-head/review.md airreview-artifact/review.md
          cp .airreview/reviews/airreview-pr-head/review.json airreview-artifact/review.json
          if [ -d .airreview/runs ]; then
            cp -R .airreview/runs airreview-artifact/runs
          fi

      - name: Upload AirReview report
        uses: actions/upload-artifact@v4
        with:
          name: airreview-report-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: airreview-artifact/

  airreview-post:
    name: Post AirReview comments
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    needs: airreview-review
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.base_ref }}

      - name: Fetch PR head and base
        run: |
          git fetch origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          git fetch origin "+refs/pull/${{ github.event.pull_request.number }}/head:refs/heads/airreview-pr-head"

      - name: Download AirReview report
        uses: actions/download-artifact@v4
        with:
          name: airreview-report-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: airreview-artifact

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AirReview
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/paul-daniel/airreview.git@main"

      - name: Post AirReview comments
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          airreview github post airreview-pr-head \
            --base origin/${{ github.base_ref }} \
            --review-json airreview-artifact/review.json \
            --markdown airreview-artifact/review.md
